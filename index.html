<!DOCTYPE html>
<html>
<body>
    <!-- The Board Container -->
    <div id="board" style="width: 400px"></div>

    <!-- CDNs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        var game = new Chess();
        var sf = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function onDrop(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            // Ask Stockfish for a move
            sf.postMessage('position fen ' + game.fen());
            sf.postMessage('go depth 10');
            
            sf.onmessage = function(e) {
                if (e.data.startsWith('bestmove')) {
                    var best = e.data.split(' ')[1];
                    game.move({ from: best.substring(0, 2), to: best.substring(2, 4), promotion: 'q' });
                    board.position(game.fen());
                }
            };
        }

        var board = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });
    </script>
</body>
</html>
