<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Stockfish</title>
    
    <!-- CSS for Chessboard.js -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; }
        #board { width: 400px; margin-top: 20px; }
        .info { margin: 20px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; background: #27ae60; border: none; color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="info">
        <h2>Play vs Stockfish</h2>
        <div id="status">Your turn (White)</div>
        <br>
        <button onclick="location.reload()">New Game</button>
    </div>

    <div id="board"></div>

    <!-- Dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var engine = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
        var $status = $('#status');

        // Initialize Engine
        engine.onmessage = function(event) {
            var line = event.data;
            if (line.indexOf('bestmove') > -1) {
                var move = line.split(' ')[1];
                game.move({
                    from: move.substring(0, 2),
                    to: move.substring(2, 4),
                    promotion: 'q' // Always promote to queen for simplicity
                });
                board.position(game.fen());
                updateStatus();
            }
        };

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false; // Player is White
        }

        function makeEngineMove() {
            $status.html('Stockfish is thinking...');
            engine.postMessage('position fen ' + game.fen());
            engine.postMessage('go depth 12'); // Adjust depth for difficulty
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();
            window.setTimeout(makeEngineMove, 250);
        }

        function updateStatus() {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Black' : 'White';

            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
            } else {
                status = moveColor + ' to move';
                if (game.in_check()) status += ', ' + moveColor + ' is in check';
            }

            $status.html(status);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = Chessboard('board', config);
        updateStatus();
    </script>
</body>
</html>
